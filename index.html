<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Študentská AI Databáza</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; }
        .container { width: 80%; max-width: 800px; margin-top: 20px; }
        .student-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; h-eight: 120px; object-fit: cover; border-radius: 5px; }
        
        #chat-box { width: 100%; max-width: 600px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden; }
        #messages { height: 300px; overflow-y: auto; padding: 15px; border-bottom: 1px solid #ddd; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; max-width: 80%; }
        .user { align-self: flex-end; background: #007bff; color: white; }
        .ai { align-self: flex-start; background: #e9e9eb; color: black; }
        
        .input-area { display: flex; padding: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Zoznam študentov</h1>
    <div class="student-list">
        {% for student in students %}
        <div class="card">
            <img src="{{ student.image }}" alt="{{ student.name }}">
            <p><strong>{{ student.name }}</strong></p>
            <p>IQ: {{ student.iq }}</p>
        </div>
        {% endfor %}
    </div>

    <div id="chat-box">
        <div id="messages">
            <div class="msg ai">Ahoj! Spýtaj sa ma niečo na študentov.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Napr. Kto má najvyššie IQ?">
            <button onclick="sendMessage()">Odoslať</button>
        </div>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById("userInput");
        const msgText = input.value.trim();
        if (!msgText) return;

        appendMessage(msgText, 'user');
        input.value = "";

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msgText })
            });
            const data = await response.json();
            appendMessage(data.reply, 'ai');
        } catch (error) {
            appendMessage("Chyba spojenia so serverom.", 'ai');
        }
    }

    function appendMessage(text, sender) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${sender}`;
        msgDiv.innerText = text;
        document.getElementById("messages").appendChild(msgDiv);
        document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    }
<select id="sortSelect">
    <option value="">Bez zoradenia</option>
    <option value="name">Podľa mena</option>
    <option value="age_desc">Najstarší</option>
    <option value="age_asc">Najmladší</option>
    <option value="iq">Najvyššie IQ</option>
</select>
</script>

</body>
</html>
