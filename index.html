<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Študenti z API</title>

<style>
    body{
        font-family: Arial, sans-serif;
        text-align: center;
        background: linear-gradient(135deg, rgb(0,100,150), rgb(0,180,255));
        color: white;
    }

    #searchBar{
        margin-top: 15px;
        padding: 10px;
        width: 250px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
    }

    #mojDivVJs{
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        margin-top: 30px;
    }

    .card{
        background-color: rgba(255,255,255,0.1);
        border-radius: 15px;
        padding: 10px;
        width: 200px;
    }

    img{
        width: 100%;
        border-radius: 10px;
    }
</style>
</head>

<body>

<h1>Zoznam študentov 👨‍🎓</h1>

<input type="text" id="searchBar" placeholder="Hľadať študenta...">

<div id="mojDivVJs"></div>

<script>

const mojDivVJs = document.getElementById("mojDivVJs")
const searchBar = document.getElementById("searchBar")

let students = []

function zobraz(studenti){
    mojDivVJs.innerHTML = ""

    studenti.forEach((student) => {

        const card = document.createElement("div")
        card.className = "card"

        const img = document.createElement("img")
        img.src = student.image

        const name = document.createElement("div")
        name.textContent = student.name

        const age = document.createElement("div")
        age.textContent = "Vek: " + student.age

        const iq = document.createElement("div")
        iq.textContent = "IQ: " + student.iq

        card.appendChild(img)
        card.appendChild(name)
        card.appendChild(age)
        card.appendChild(iq)

        mojDivVJs.appendChild(card)
    })
}

fetch("http://127.0.0.1:5000/api")
.then(res => res.json())
.then(data => {
    students = data.students
    zobraz(students)
})

searchBar.addEventListener("input", () => {
    const text = searchBar.value.toLowerCase()

    const filtrovane = students.filter(s =>
        s.name.toLowerCase().includes(text)
    )

    zobraz(filtrovane)
})

</script>

</body>
</html>
